[package]
name = "enclaves"
version = "0.1.1"
edition = "2021"
description = "bount-AI TEE contract for Terminal 3 (T3N) — confidential Venice AI inference; API key read from z:<tid>:secrets inside the enclave"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "lib"]

[dependencies]
wit-bindgen = { version = "0.49", default-features = false, features = ["macros", "realloc"] }
serde = { version = "1.0", default-features = false, features = ["derive", "alloc"] }
serde_json = { version = "1.0", default-features = false, features = ["alloc"] }
hex = { version = "0.4", default-features = false, features = ["alloc"] }

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true
